<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-yellow-400">
    <section class="bg-white rounded-lg shadow-lg p-12 m-12">

        <div class="flex items-center justify-between mb-8">

            <!-- Back Button -->
            <button>
                <svg xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="2"
                    stroke="currentColor"
                    class="w-7 h-7 text-gray-800">
                    <path stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M15.75 19.5 8.25 12l7.5-7.5" />
                </svg>
            </button>

            <!-- Title -->
            <h1 class="text-3xl font-semibold">
                New Products
            </h1>

            <!-- Search Button -->
            <button>
                <svg xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="w-6 h-6 text-gray-900">
                    <path stroke-linecap="round"
                        stroke-linejoin="round"
                        d="m21 21-4.35-4.35m0 0A7.5 7.5 0 1 0 5.4 5.4a7.5 7.5 0 0 0 11.25 11.25Z" />
                </svg>
            </button>

        </div>

        <div id="total-section" class="hidden flex items-center justify-between mb-8">
    <p class="text-2xl font-semibold text-gray-800">Total</p>
    <p id="total-price" class="text-2xl font-semibold text-blue-500">$0</p>
</div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 p-4">

            <!-- Salad -->
            <div class="product-card" data-price="100">
                <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8Zm9vZHxlbnwwfHwwfHx8MA%3D%3D&auto=format&fit=crop&w=500&q=60" alt="Food Image" class="w-full h-64 object-cover rounded-lg shadow-lg">
                <div class="p-3 shadow-lg gap-4">
                    <h3 class="font-semibold text-3xl text-center">salad</h3>
                    <p class="text-blue-500 text-3xl font-semibold text-center">$100</p>
                    <div class="text-center">
                        <button class="decrease bg-gray-200 text-black px-4 py-2 rounded">-</button>
                        <button class="count bg-gray-200 text-black px-4 py-2 rounded">0</button>
                        <button class="increase bg-gray-200 text-black px-4 py-2 rounded">+</button>
                    </div>
                </div>
            </div>

            <!-- Bread -->
            <div class="product-card" data-price="70">
                <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8Zm9vZHxlbnwwfHwwfHx8MA%3D%3D&auto=format&fit=crop&w=500&q=60" alt="Food Image" class="w-full h-64 object-cover rounded-lg shadow-lg">
                <div class="p-3 shadow-lg">
                    <h3 class="font-semibold text-3xl text-center">Bread</h3>
                    <p class="text-blue-500 text-3xl font-semibold text-center">$70</p>
                    <div class="text-center">
                        <button class="decrease bg-gray-200 text-black px-4 py-2 rounded">-</button>
                        <button class="count bg-gray-200 text-black px-4 py-2 rounded">0</button>
                        <button class="increase bg-gray-200 text-black px-4 py-2 rounded">+</button>
                    </div>
                </div>
            </div>

            <!-- Tacos -->
             
            <div class="product-card" data-price="150">
                <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8Zm9vZHxlbnwwfHwwfHx8MA%3D%3D&auto=format&fit=crop&w=500&q=60" alt="Food Image" class="w-full h-64 object-cover rounded-lg shadow-lg">
                <div class="p-3 shadow-lg">
                    <h3 class="font-semibold text-3xl text-center">Tacos</h3>
                    <p class="text-blue-500 text-3xl font-semibold text-center">$150</p>
                    <div class="text-center">
                        <button class="decrease bg-gray-200 text-black px-4 py-2 rounded">-</button>
                        <button class="count bg-gray-200 text-black px-4 py-2 rounded">0</button>
                        <button class="increase bg-gray-200 text-black px-4 py-2 rounded">+</button>
                    </div>
                </div>
            </div>

            <!-- Sandwich -->
            <div class="product-card" data-price="69">
                <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8Zm9vZHxlbnwwfHwwfHx8MA%3D%3D&auto=format&fit=crop&w=500&q=60" alt="Food Image" class="w-full h-64 object-cover rounded-lg shadow-lg">
                <div class="p-3 shadow-lg">
                    <h3 class="font-semibold text-3xl text-center">Sandwich</h3>
                    <p class="text-blue-500 text-3xl font-semibold text-center">$69</p>
                    <div class="text-center">
                        <button class="decrease bg-gray-200 text-black px-4 py-2 rounded">-</button>
                        <button class="count bg-gray-200 text-black px-4 py-2 rounded">0</button>
                        <button class="increase bg-gray-200 text-black px-4 py-2 rounded">+</button>
                    </div>
                </div>
            </div>

            <!-- Pizza -->
            <div class="product-card" data-price="100">
                <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8Zm9vZHxlbnwwfHwwfHx8MA%3D%3D&auto=format&fit=crop&w=500&q=60" alt="Food Image" class="w-full h-64 object-cover rounded-lg shadow-lg">
                <div class="p-3 shadow-lg">
                    <h3 class="font-semibold text-3xl text-center">Pizza</h3>
                    <p class="text-blue-500 text-3xl font-semibold text-center">$100</p>
                    <div class="text-center">
                        <button class="decrease bg-gray-200 text-black px-4 py-2 rounded">-</button>
                        <button class="count bg-gray-200 text-black px-4 py-2 rounded">0</button>
                        <button class="increase bg-gray-200 text-black px-4 py-2 rounded">+</button>
                    </div>
                </div>
            </div>

            <!-- Pasta -->
            <div class="product-card" data-price="50">
                <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8Zm9vZHxlbnwwfHwwfHx8MA%3D%3D&auto=format&fit=crop&w=500&q=60" alt="Food Image" class="w-full h-64 object-cover rounded-lg shadow-lg">
                <div class="p-3 shadow-lg">
                    <h3 class="font-semibold text-3xl text-center">Pasta</h3>
                    <p class="text-blue-500 text-3xl font-semibold text-center">$50</p>
                    <div class="text-center line-height-2.2">
                        <button class="decrease bg-gray-200 text-black px-4 py-2 rounded">-</button>
                        <button class="count bg-gray-200 text-black px-4 py-2 rounded">0</button>
                        <button class="increase bg-gray-200 text-black px-4 py-2 rounded">+</button>
                    </div>
                </div>
            </div>

        </div>

    </section>

    <script src="food.js"></script>
</body>
</html>
