<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-500 flex items-center justify-center h-screen">
<div class="bg-white shadow-lg rounded-xl p-8 text-center">

    <h1 class="text-3xl font-bold mb-6">Counter</h1>

    <p id="count" class="text-6xl font-bold mb-8">0</p>

    <div class="flex justify-center gap-4">

        <button id="decrease"
             class="bg-red-500 text-white px-4 py-2 rounded">
            -
        </button>

        <button id="reset"
             class="bg-yellow-500 text-white px-4 py-2 rounded">
            Reset
        </button>

        <button id="increase"
             class="bg-green-500 text-white px-4 py-2 rounded">
            +
        </button>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
